# Render deployment blueprint for Vivid Lingua.
#
# NOTE: production currently runs on VERCEL (see DEPLOY.md). This blueprint is
# kept as a fallback deploy target; if you use it, fill in EVERY secret below
# in the Render dashboard or payments/auth/AI/TTS boot broken.
services:
  - type: web
    name: vivid-lingua
    runtime: node
    plan: free
    # --include=dev forces build tools (vite, esbuild, typescript) to install
    # even though they're devDependencies, so the production build can run.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      # All secrets are sync:false — paste values in the Render dashboard,
      # never commit them.
      # Firebase Admin SDK (auth verification + all entitlement writes).
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      # Byl payment gateway (QPay/SocialPay checkout) + webhook signing secret.
      - key: BYL_TOKEN
        sync: false
      - key: BYL_PROJECT_ID
        sync: false
      - key: BYL_WEBHOOK_SECRET
        sync: false
      # Gemini for AI grading — either a plain API key or Vertex AI project
      # settings (see backend/lib/ai.ts for the resolution order).
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_VERTEX_PROJECT
        sync: false
      - key: GOOGLE_VERTEX_LOCATION
        sync: false
      # Azure neural TTS proxy (listening playback). Optional; the client falls
      # back to browser speechSynthesis without it.
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      # Public URL used for payment success/cancel redirects.
      - key: APP_BASE_URL
        sync: false
