name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Type-check and tests both walk the large generated vocab data files,
      # so they need a bigger old-space than the Node default.
      - name: Type-check (npm run lint = tsc --noEmit)
        run: npm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Tests
        run: npm test
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Production build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
